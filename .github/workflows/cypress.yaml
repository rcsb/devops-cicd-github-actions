name: Cypress UI Test

on:
  workflow_call:
    inputs:
      branch:
        type: string
        required: true
      type:
        type: string
        required: true
      node_version:
        type: string
        default: "16"
  workflow_dispatch:
    inputs:
      branch:
        type: string
        required: true
      type:
        type: string
        required: true
      node_version:
        type: string
        default: "16"

jobs:
  cypress-test:
    runs-on: ["self-hosted","node-${{ inputs.node_version }}","west"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cypress headless test
        if: inputs.type == 'push'
        uses: cypress-io/github-action@v6
        with:
          start: npm start
          wait-on: 'http://localhost:8080'
          browser: chrome
          spec: cypress/tests/*/*.js
          config: trashAssetsBeforeRuns=false
        env:
          CYPRESS_SCREENSHOTS_FOLDER: /home/runner/cypress/screenshots
          NODE_ENV: test
          SIERRA_CONFIG: cypress/config/sierra-base.json,cypress/config/sierra-app.json,cypress/config/sierra-secrets.json
      - name: Cypress nightly test
        if: inputs.type == 'nightly'
        uses: cypress-io/github-action@v6
        with:
          start: npm start
          wait-on: 'http://localhost:8080'
          browser: chrome
          headed: true
          spec: cypress/tests/homepage/*.js
          config: trashAssetsBeforeRuns=false
        env:
          CYPRESS_SCREENSHOTS_FOLDER: /home/runner/cypress/screenshots
          NODE_ENV: test
          SIERRA_CONFIG: cypress/config/sierra-base.json,cypress/config/sierra-app.json,cypress/config/sierra-secrets.json
